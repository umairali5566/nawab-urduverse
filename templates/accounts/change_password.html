{% extends 'base.html' %}

{% block title %}Change Password - {{ SITE_NAME }}{% endblock %}

{% block content %}
<section class="page-header py-4">
    <div class="main-container">
        <h1 class="mb-1">Change Password</h1>
    </div>
</section>

<section class="py-3">
    <div class="main-container" style="max-width: 720px;">
        <div class="card">
            <div class="card-body">
                <form method="post" class="row g-3">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <div class="col-12">
                        <button type="submit" class="btn btn-primary">Update Password</button>
                        <a href="{% url 'dashboard' %}" class="btn btn-outline-primary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>
{% endblock %}
