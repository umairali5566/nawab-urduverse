{% extends 'base.html' %}
{% load static %}

{% block title %}لاگ ان - {{ SITE_NAME }}{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title mb-0">لاگ ان</h3>
                </div>
                <div class="card-body">
                    {% if messages %}
                    <div class="mb-3">
                        {% for message in messages %}
                        <div class="alert alert-{{ message.tags }}">{{ message }}</div>
                        {% endfor %}
                    </div>
                    {% endif %}

                    <form method="post">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <button type="submit" class="btn btn-primary">لاگ ان</button>
                    </form>
                </div>
                <div class="card-footer">
                    <a href="{% url 'password_reset' %}">پاس ورڈ بھول گئے؟</a>
                    <br>
                    <a href="{% url 'register' %}">رجسٹر کریں</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
