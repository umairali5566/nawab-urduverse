{% extends 'base.html' %}

{% block title %}Delete Account - {{ SITE_NAME }}{% endblock %}

{% block content %}
<section class="page-header py-4">
    <div class="main-container">
        <h1 class="mb-1">Delete Account</h1>
    </div>
</section>

<section class="py-3">
    <div class="main-container" style="max-width: 720px;">
        <div class="card border-danger">
            <div class="card-body">
                <h3 class="section-title text-danger">This action is permanent</h3>
                <p class="mb-4">Your profile and related data will be removed permanently.</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Delete My Account</button>
                    <a href="{% url 'dashboard' %}" class="btn btn-outline-primary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</section>
{% endblock %}
