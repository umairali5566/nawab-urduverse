{% if ADSENSE_ENABLED and ADSENSE_CLIENT_ID and ad_slot %}
<div class="card glass-card ad-slot-card">
    <div class="card-body">
        <div class="ad-slot-label">{{ ad_label|default:"Sponsored" }}</div>
        <ins
            class="adsbygoogle"
            style="display:block"
            data-ad-client="{{ ADSENSE_CLIENT_ID }}"
            data-ad-slot="{{ ad_slot }}"
            data-ad-format="auto"
            data-full-width-responsive="true"
        ></ins>
        <script>
            (adsbygoogle = window.adsbygoogle || []).push({});
        </script>
    </div>
</div>
{% endif %}
