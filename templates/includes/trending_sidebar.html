{% if trending_sidebar_posts %}
<div class="card glass-card">
    <div class="card-body">
        <h5 class="card-title mb-3">
            <i class="bi bi-fire text-danger"></i> Trending
        </h5>
        <div class="list-group list-group-flush">
            {% for item in trending_sidebar_posts %}
            <a href="{{ item.url }}" class="list-group-item list-group-item-action px-0">
                <div class="d-flex align-items-start gap-2">
                    <i class="bi {{ item.icon }} text-primary mt-1"></i>
                    <div>
                        <div class="fw-semibold small">{{ item.title|truncatechars:60 }}</div>
                        <small class="text-muted">{{ item.content_type }} - {{ item.views_count }} views - {{ item.likes_count }} likes - {{ item.shares_count|default:0 }} shares</small>
                    </div>
                </div>
            </a>
            {% endfor %}
        </div>
    </div>
</div>
{% endif %}
