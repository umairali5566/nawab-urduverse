{% extends 'dashboard/dashboard_base.html' %}
{% block title %}Add Blog Post - Dashboard{% endblock %}

{% block content %}
<div class="section-spacing">
    <h2 class="section-title mb-3">Add New Blog Post</h2>
    <div class="card">
        <div class="card-body">
            <form method="post" enctype="multipart/form-data" class="row g-3">
                {% csrf_token %}
                <div class="col-md-6">
                    <label class="form-label">Title *</label>
                    <input type="text" name="title" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Author *</label>
                    <input type="text" name="author" class="form-control" required>
                </div>
                <div class="col-12">
                    <label class="form-label">Blog Content *</label>
                    <textarea name="content" class="form-control" rows="10" required></textarea>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Thumbnail</label>
                    <input type="file" name="featured_image" class="form-control" accept="image/*">
                </div>
                <div class="col-12 d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Publish Blog Post</button>
                    <a href="{% url 'dashboard_blog_list' %}" class="btn btn-outline-primary">Back to list</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
