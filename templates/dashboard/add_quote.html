{% extends 'dashboard/dashboard_base.html' %}
{% block title %}Add Quote - Dashboard{% endblock %}

{% block content %}
<div class="section-spacing">
    <h2 class="section-title mb-3">Add New Quote</h2>
    <div class="card">
        <div class="card-body">
            <form method="post" enctype="multipart/form-data" class="row g-3">
                {% csrf_token %}
                <div class="col-md-6">
                    <label class="form-label">Author *</label>
                    <input type="text" name="author" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Quote Type</label>
                    <select name="quote_type" class="form-select">
                        <option value="motivational">Motivational</option>
                        <option value="islamic">Islamic</option>
                        <option value="love">Love</option>
                        <option value="life">Life</option>
                        <option value="friendship">Friendship</option>
                        <option value="success">Success</option>
                        <option value="wisdom">Wisdom</option>
                    </select>
                </div>
                <div class="col-12">
                    <label class="form-label">Quote Text *</label>
                    <textarea name="quote" class="form-control" rows="6" required></textarea>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Background Image</label>
                    <input type="file" name="background_image" class="form-control" accept="image/*">
                </div>
                <div class="col-12 d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Publish Quote</button>
                    <a href="{% url 'dashboard_quote_list' %}" class="btn btn-outline-primary">Back to list</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
