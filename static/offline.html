<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#6C5CE7">
    <title>Nawab UrduVerse Offline</title>
    <style>
        :root {
            color-scheme: light dark;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            background: linear-gradient(270deg, #6C5CE7, #00B4D8, #0F172A);
            background-size: 220% 220%;
            animation: bg-flow 14s ease infinite;
            font-family: "Poppins", "Inter", "Noto Naskh Arabic", sans-serif;
            color: #F8FAFC;
        }

        .offline-card {
            width: min(100%, 560px);
            padding: 32px;
            border-radius: 28px;
            background: rgba(15, 23, 42, 0.58);
            border: 1px solid rgba(255, 255, 255, 0.14);
            backdrop-filter: blur(24px);
            box-shadow: 0 24px 80px rgba(15, 23, 42, 0.28);
            text-align: center;
        }

        h1 {
            margin: 0 0 16px;
            font-size: clamp(2rem, 5vw, 2.8rem);
            line-height: 1.1;
        }

        p {
            margin: 0 0 16px;
            line-height: 1.8;
            color: rgba(248, 250, 252, 0.86);
        }

        .offline-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 50px;
            padding: 0 22px;
            border-radius: 16px;
            background: linear-gradient(45deg, #6C5CE7, #00B4D8);
            color: #FFFFFF;
            text-decoration: none;
            font-weight: 700;
            box-shadow: 0 18px 36px rgba(15, 23, 42, 0.22);
        }

        @keyframes bg-flow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body>
    <main class="offline-card">
        <h1>Nawab UrduVerse</h1>
        <p>You are offline right now. Previously cached pages and static assets will keep working, and you can reconnect anytime to continue reading.</p>
        <p>انٹرنیٹ بحال ہونے پر آپ دوبارہ شاعری، ناول، بلاگز، اقتباسات اور ویڈیوز تک رسائی حاصل کر سکیں گے۔</p>
        <a class="offline-link" href="/">Try again</a>
    </main>
</body>
</html>
